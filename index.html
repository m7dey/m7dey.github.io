<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<!-- FIX 1: Correct viewport for mobile — prevents layout shifts and zoom bugs on iOS/Android -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0">
<!-- FIX 2: theme-color for Android Chrome status bar -->
<meta name="theme-color" content="#0d0810">
<!-- FIX 3: Apple mobile web app meta tags for iOS Safari full-screen feel -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Our Story ❤️</title>
<!-- FIX 4: Preconnect to fonts domain to reduce latency -->
<link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<!--
  FIX 5: Arabic font rendering — added Noto Naskh Arabic as primary Arabic font.
  Cairo is a good Arabic font but Noto Naskh ensures correct ligature/connection
  on older Android WebView and Samsung Internet. Also added font-display=swap
  to avoid invisible text during load (FOIT).
-->
<link href="https://fonts.googleapis.com/css2?family=Noto+Naskh+Arabic:wght@400;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Cairo:wght@300;400;600&family=Dancing+Script:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- atmosphere -->
<div id="bgGrad"></div>
<div id="vignette"></div>
<div id="heartsLayer"></div>

<!-- burst canvas -->
<canvas id="burstCanvas" aria-hidden="true"></canvas>

<!-- chapter wipe -->
<div id="wipe" aria-hidden="true"></div>

<!-- ══════════════════════════════════
     ① NETFLIX INTRO
══════════════════════════════════ -->
<div id="netflixScreen" role="presentation" aria-hidden="true">
  <div class="n-logo">NETFLIX</div>
</div>

<!-- ══════════════════════════════════
     ② TEXT INTRO
══════════════════════════════════ -->
<div id="textScreen" aria-hidden="true">
  <!--
    FIX 6: dir="rtl" on the wrapper + lang="ar" on each Arabic paragraph.
    This ensures correct bidirectional text resolution on all browsers.
    unicode-bidi:isolate (set in CSS) is more correct than plaintext for
    mixed-direction content (e.g. "NETFLIX presents..." is LTR).
  -->
  <div id="textWrap" dir="rtl">
    <p class="tw-line" id="tl0" dir="auto"></p>
    <p class="tw-line" id="tl1" dir="auto" lang="ar"></p>
    <p class="tw-line" id="tl2" dir="auto" lang="ar"></p>
    <p class="tw-line" id="tl3" dir="auto" lang="ar"></p>
  </div>
</div>

<!-- ══════════════════════════════════
     ③ VIDEO
══════════════════════════════════ -->
<div id="videoScreen">
  <!--
    FIX 7: Video optimizations for mobile:
    - playsinline is critical for iOS (prevents fullscreen takeover)
    - preload="metadata" instead of default "auto" — saves bandwidth on mobile
    - muted attribute added — browsers now REQUIRE muted for autoplay on mobile
    - webkit-playsinline for older iOS
    - Added poster attribute placeholder (set via JS) for better perceived performance
  -->
  <video id="mainVideo"
    autoplay
    muted
    playsinline
    webkit-playsinline
    preload="metadata"
    aria-label="intro video">
    <source src="intro.mp4" type="video/mp4">
  </video>
  <div class="vid-grad-top" aria-hidden="true"></div>
  <div class="vid-grad" aria-hidden="true"></div>
  <div id="vidSub" aria-live="polite"></div>
  <div id="aiPill" aria-live="polite"></div>
  <!-- زر تفعيل الصوت — يظهر تلقائياً ويختفي بعد الضغط -->
  <button type="button" id="unmuteBtn" onclick="unmuteVideo()" aria-label="تفعيل الصوت">
    🔇 <span>اضغط للصوت</span>
  </button>
</div>

<!-- ══════════════════════════════════
     ④ MAIN APP
══════════════════════════════════ -->
<div id="app">

  <!-- START -->
  <div class="scene" id="startScene">
    <div class="card">
      <p class="eyebrow">A Netflix Original Experience</p>
      <div class="deco" aria-hidden="true"><span class="deco-heart">🌸</span></div>
      <!-- FIX 8: lang="ar" on Arabic headings ensures correct font shaping -->
      <h1 class="title-script" lang="ar">قصتنا ❤️</h1>
      <p class="subtitle-copy" lang="ar">تجربة رومانسية سينمائية تفاعلية</p>
      <!-- FIX 9: Use type="button" on all buttons to prevent accidental form submission -->
      <button type="button" class="btn-rose" onclick="startStory()">
        <span lang="ar">ابدئي</span>&nbsp;▶
      </button>
    </div>
  </div>

  <!-- QUIZ -->
  <div class="scene" id="quizScene">
    <div class="card">
      <div class="prog-track" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100" aria-label="تقدم الاختبار">
        <div class="prog-fill" id="progFill" style="width:0%"></div>
      </div>
      <p class="scene-tag" id="sceneTag" lang="ar">لحظة ١ / ١٠</p>
      <div class="question-text" id="qText" dir="rtl" lang="ar"></div>
      <div class="choices" id="choicesWrap" dir="rtl" lang="ar"></div>
    </div>
  </div>

  <!-- MEMORIES -->
  <div class="scene" id="memoriesScene">
    <div class="card">
      <div class="deco" aria-hidden="true"><span class="deco-heart">💖</span></div>
      <h2 class="mem-title" lang="ar">الذكريات</h2>
      <p class="mem-sub">Memories Gallery</p>
      <div class="mem-grid" id="memGrid" role="list"></div>
      <div class="mem-actions">
        <button type="button" class="btn-ghost" onclick="playSong2()">🎵 <span lang="ar">أغنية الذكريات</span></button>
        <button type="button" class="btn-ghost" onclick="restartStory()">↺ <span lang="ar">من البداية</span></button>
      </div>
    </div>
  </div>

  <!-- END -->
  <div class="scene" id="endScene">
    <div class="card">
      <span class="end-icon" aria-hidden="true">❤️</span>
      <div class="deco" aria-hidden="true"><span class="deco-heart">🌙</span></div>
      <h2 lang="ar">هاي إنتِ 🌙</h2>
      <p lang="ar">شكراً إنك كنتِ وبتكوني</p>
      <button type="button" class="btn-rose" onclick="goToMemories()">📚 <span lang="ar">الذكريات</span></button>
    </div>
  </div>

</div><!-- #app -->

<!-- ══════════════════════════════════
     MODAL
══════════════════════════════════ -->
<!--
  FIX 10: role="dialog" + aria-modal + aria-labelledby for accessibility.
  Also click-outside closes modal (already in JS, kept).
-->
<div id="modal" role="dialog" aria-modal="true" aria-labelledby="modalLabel" onclick="modalBackdropClick(event)">
  <div id="modalCard" dir="rtl">
    <!-- cinematic photo strip -->
    <div id="modalPhoto" aria-hidden="true"></div>
    <!-- body -->
    <div id="modalBody" dir="rtl" lang="ar">
      <div id="modalEmojiWrap" aria-hidden="true">
        <span id="modalEmoji"></span>
      </div>
      <div class="deco" aria-hidden="true"><span class="deco-heart">✨</span></div>
      <span id="modalLabel"></span>
      <p id="modalText" dir="rtl" lang="ar"></p>
      <button type="button" id="modalClose" onclick="closeModal()">✕ &nbsp;<span lang="ar">إغلاق</span></button>
    </div>
  </div>
</div>

<!-- AUDIO -->
<!--
  FIX 11: preload="none" on audio — do not preload audio files on mobile,
  this drastically reduces initial bandwidth and avoids mobile data waste.
-->
<audio id="song1" loop preload="none"><source src="song1.mp3" type="audio/mpeg"></audio>
<audio id="song2" loop preload="none"><source src="song2.mp3" type="audio/mpeg"></audio>

<script src="script.js" defer></script>
</body>
</html>
